<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="logos/logo-png.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merced RS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: #333;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" style="color: white; margin-left: 0%;">Merced</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="contact.html">Contact Us</a>
                    <a class="nav-link" href="faq.html">FAQ</a>
                </div>
            </div>
            <div class="ms-auto d-flex align-items-center">
                <div class="navbar-nav ms-3" style="margin-right: 5%;">
                    <i class="bi bi-facebook" style="color: white;"></i>
                    <i class="bi bi-instagram" style="color: white;"></i>
                    <i class="bi bi-twitter-x" style="color: white;"></i>
                </div>
                <a href="booking.html"><button type="button" class="btn btn-secondary long-btn">Book a Room</button></a>
            </div>
        </div>
    </nav>
    <div class="container my-5">
        <div class="row align-items-center">
            <div class="col-md-6">
                <img src="images/contact1.jpg" class="img-fluid rounded" alt="Contact Image">
            </div>
            <div class="col-md-6 d-flex flex-column justify-content-center text-center">
                <section class="contact-hero">
                    <h1>Get in Touch</h1>
                    <p>We'd love to hear from you! Whether you have questions, feedback, or just want to say hi, reach out to us.</p>    
                </section>
                <section class="contact-form w-100">
                    <div class="row justify-content-center">
                        <div class="col-md-10">
                            <form>
                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="name" placeholder="Your Name">
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" placeholder="your@email.com">
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" rows="4" placeholder="Write your message here"></textarea>
                                </div>
                                <button type="submit" class="btn btn-secondary w-100">Send Message</button>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <footer class="contact">
        <div class="container">
          <p>Email us: <a href="email:MercedRs@gmail.com" class="text-white">MercedRs@gmail.com</a></p>
          <p>Location: 122 Street, 19839 City</p>
          <div>
            <a href="https://facebook.com" class="text-white me-3" target="_blank">Facebook</a>
            <a href="https://twitter.com" class="text-white me-3" target="_blank">Twitter</a>
            <a href="https://instagram.com" class="text-white me-3" target="_blank">Instagram</a>
          </div>
          <p class="mt-3">© 2025 MercedRs. All Rights Reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
